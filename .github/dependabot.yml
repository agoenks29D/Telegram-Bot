version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    target-branch: develop
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 10
    groups:
      # Group all patch updates together
      patch-updates:
        update-types:
          - patch
      # Group all minor updates together
      minor-updates:
        update-types:
          - minor
    ignore:
      # telegraf major version bumps need manual review
      - dependency-name: telegraf
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    target-branch: develop
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - automated
    commit-message:
      prefix: "chore(actions)"
      include: scope